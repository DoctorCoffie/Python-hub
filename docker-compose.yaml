services:
  app:
    build: .
    image: python-hub:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://pythonhub:pythonhub@postgres:5432/pythonhub
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_SECRET: change-me
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pythonhub
      POSTGRES_PASSWORD: pythonhub
      POSTGRES_DB: pythonhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
