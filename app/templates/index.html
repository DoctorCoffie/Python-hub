<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Python Hub</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="site-banner">
        <p class="domain">PH.viktorgojka.com</p>
        <p class="site-title">Python Hub Home Page</p>
      </header>
      <section class="hero">
        <div>
          <p class="eyebrow">Python Hub</p>
          <h1>Cold-blooded. Warm welcome.</h1>
          <p class="lede">
            A minimal, stateless app that stores python memories in Postgres.
          </p>
          <div class="actions">
            <a class="btn" href="/snake-game">Play snake</a>
            <a class="btn ghost" href="/upload">Upload a python</a>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Featured Python</div>
          <div class="card-body">
            <div class="python-spot">
              <div class="snake-pics">
                <img
                  class="snake-pic"
                  src="https://i.pinimg.com/736x/75/83/32/758332558d69d6070f800f4e73465ca3.jpg"
                  alt="Python snake"
                />
                <img
                  class="snake-pic"
                  src="https://th.bing.com/th/id/OIP.4Q81O5bz55d7p3c6V6QjKgHaHj?w=214&h=181&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
                  alt="Python snake"
                />
                <img
                  class="snake-pic"
                  src="https://th.bing.com/th/id/OIP.yQQ1Qpk4hzMLZRx_E8IM6QHaD0?w=301&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
                  alt="Python snake"
                />
              </div>
            </div>
            <p>Upload a python image or drop a description to size it up.</p>
          </div>
        </div>
      </section>
      <section class="gallery">
        <h2>Python Gallery</h2>
        <div class="gallery-grid">
          <img
            src="https://th.bing.com/th/id/OIP.jOMWfMehUp70Z22N-xWeMAHaE8?w=242&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
            alt="Python snake"
          />
          <img
            src="https://th.bing.com/th/id/OIP.yQQ1Qpk4hzMLZRx_E8IM6QHaD0?w=301&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
            alt="Python snake"
          />
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
